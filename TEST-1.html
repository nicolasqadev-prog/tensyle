<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tensyle | Engineering, Motion & Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --black: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        /* SCROLL SNAPPING: El secreto de la fluidez */
        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
        body { background-color: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        section { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        /* --- BACKGROUND PLANOS (ESTÁTICO MIENTRAS BAJAS) --- */
        .blueprint-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('blueprint-tensyle.png');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            transition: transform 0.2s ease-out;
        }

        #cursor {
            position: fixed; width: 10px; height: 10px; background: var(--cyan);
            border-radius: 50%; z-index: 10000; pointer-events: none;
            box-shadow: 0 0 20px var(--cyan); transform: translate(-50%, -50%);
        }

        /* --- NAVEGACIÓN --- */
        nav { position: fixed; top: 0; width: 100%; padding: 30px; display: flex; justify-content: space-between; z-index: 1000; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-family: 'Oswald'; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--cyan); }

        /* --- SECCIÓN 1: HOME --- */
        .hero h1 { font-family: 'Oswald'; font-size: clamp(5rem, 20vw, 12rem); font-weight: 700; letter-spacing: -5px; line-height: 0.85; text-transform: uppercase; }
        .hero p { font-family: 'Oswald'; color: var(--cyan); letter-spacing: 10px; font-size: 0.8rem; margin-top: 20px; text-transform: uppercase; }

        /* --- SECCIONES DE CONTENIDO --- */
        .content-wrap { width: 90%; max-width: 1200px; text-align: left; }
        .section-tag { font-family: 'Oswald'; color: var(--cyan); letter-spacing: 5px; font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        .section-title { font-family: 'Oswald'; font-size: 4rem; text-transform: uppercase; margin-bottom: 40px; line-height: 1; }

        .portfolio-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; }
        
        .card-oryzo {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); height: 350px; position: relative; overflow: hidden;
        }
        .card-oryzo img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .img-before { position: absolute; top: 0; left: 0; z-index: 2; filter: grayscale(1) brightness(0.5); }
        .card-oryzo:hover .img-before { opacity: 0; }

        /* INDICADOR DE SCROLL */
        .scroll-indicator { position: absolute; bottom: 30px; font-family: 'Oswald'; font-size: 0.6rem; letter-spacing: 3px; opacity: 0.3; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="blueprint-fixed" id="blueprint"></div>

    <nav>
        <div style="font-family:'Oswald'; letter-spacing:3px;">TEN<span>SYLE</span></div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#automotive">Automotive</a>
            <a href="#motion">Motion</a>
            <a href="#home-decor">Home Decor</a>
        </div>
    </nav>

    <section id="home" class="hero">
        <h1>TENSYLE</h1>
        <p>Precision • Motion • Design</p>
        <div class="scroll-indicator">SCROLL TO EXPLORE</div>
    </section>

    <section id="automotive">
        <div class="content-wrap">
            <p class="section-tag">01. Engineering</p>
            <h2 class="section-title">Automotive DNA</h2>
            <div class="portfolio-mini-grid">
                <div class="card-oryzo">
                    <img src="lateral-moto-fin.jpg" class="img-after">
                    <img src="lateral-moto-impresa-antes.jpg" class="img-before">
                </div>
                <div class="card-oryzo">
                    <img src="frontal-rejilla-despues.jpg" class="img-after">
                    <img src="frontal-rejilla-despues-antes.jpg" class="img-before">
                </div>
            </div>
        </div>
    </section>

    <section id="motion">
        <div class="content-wrap">
            <p class="section-tag">02. Animation</p>
            <h2 class="section-title">Motion Collection</h2>
            <div class="portfolio-mini-grid">
                <div class="card-oryzo"><img src="pokemon-2.jpg"></div>
                <div class="card-oryzo"><img src="transformers.jpg"></div>
            </div>
        </div>
    </section>

    <section id="home-decor">
        <div class="content-wrap">
            <p class="section-tag">03. Lifestyle</p>
            <h2 class="section-title">Home & Art</h2>
            <div class="portfolio-mini-grid">
                <div class="card-oryzo" style="background: rgba(0, 242, 255, 0.05); display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
                    <p style="font-family:'Oswald'; letter-spacing:2px; font-size:0.8rem;">PRÓXIMAMENTE:<br>ARTE FUNCIONAL PARA EL HOGAR</p>
                </div>
                <div class="card-oryzo"><img src="pocoyo.jpg"></div>
            </div>
        </div>
    </section>

    <script>
        const blueprint = document.getElementById('blueprint');
        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            blueprint.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    </script>
</body>
</html>
