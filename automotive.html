<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tensyle Automotive | Reconstrucción 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Oswald:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --black: #050505; --gray: #121212; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 12px 0; z-index: 1000; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 30px; }
        nav a { color: white; text-decoration: none; font-family: 'Oswald'; letter-spacing: 2px; font-size: 0.75rem; }
        header { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid var(--blue); background: radial-gradient(circle, #0a1a20, #000); }
        h1 { font-family: 'Oswald'; font-size: 5rem; letter-spacing: 15px; margin: 0; }
        .slogan { color: var(--blue); letter-spacing: 10px; font-family: 'Oswald'; }
        .container { max-width: 1200px; margin: auto; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .img-container { display: flex; height: 300px; position: relative; }
        .img-box { flex: 1; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .tag { position: absolute; bottom: 10px; background: rgba(0,0,0,0.8); color: var(--blue); padding: 2px 8px; font-size: 0.6rem; font-family: 'Oswald'; }
        .info { padding: 20px; }
        .info h3 { font-family: 'Oswald'; color: var(--blue); margin: 0; }
        .wa-float { position: fixed; bottom: 25px; right: 25px; width: 55px; }
    </style>
</head>
<body>
    <nav><a href="index.html">INICIO</a><a href="motion.html">MOTION</a></nav>
    <header><h1>TENSYLE</h1><p class="slogan">PRECISION IN EVERY LAYER</p></header>
    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="img-container">
                    <div class="img-box"><img src="lateral-moto-impresa-antes.jpg"><span class="tag">ANTES</span></div>
                    <div class="img-box"><img src="lateral-moto-fin.jpg"><span class="tag">FINAL</span></div>
                </div>
                <div class="info"><span>YAMAHA FAZER</span><h3>Carena Lateral</h3></div>
            </div>
        </div>
    </div>
    <a href="https://wa.me/573171687777" class="wa-float" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"></a>
</body>
</html>
