<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENSYLE | Core Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Oswald:wght@200;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --black: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); height: 100vh; overflow: hidden; font-family: 'Oswald', sans-serif; display: flex; align-items: center; justify-content: center; color: white; }

        /* Fondo Dinámico de Ingeniería */
        .bg-scanner { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a1e24 0%, #000 100%); z-index: -1; }
        .bg-scanner::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,242,255,0.03) 0px, transparent 1px); background-size: 100% 4px; animation: scan 10s linear infinite; }
        @keyframes scan { from { transform: translateY(0); } to { transform: translateY(100%); } }

        /* LOGO TENSYLE - Efecto Impacto Mercedes Style */
        .brand-logo { position: absolute; width: 350px; z-index: 100; filter: drop-shadow(0 0 40px var(--cyan)); animation: logoFocus 3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes logoFocus {
            0% { transform: scale(3) translateZ(500px); opacity: 0; filter: blur(30px) brightness(5); }
            100% { transform: scale(1) translateY(-220px); width: 100px; opacity: 1; filter: blur(0) brightness(1); }
        }

        /* Portales de Selección Cinéticos */
        .main-portal { display: flex; width: 100vw; height: 100vh; opacity: 0; animation: fadeInUI 1s ease-out 2.5s forwards; }
        .section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; position: relative; border-right: 1px solid rgba(0, 242, 255, 0.1); transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); overflow: hidden; }
        .section:last-child { border: none; }
        
        .section::before { content: ""; position: absolute; width: 100%; height: 100%; background: var(--cyan); opacity: 0; transition: 0.5s; z-index: 0; }
        .section:hover::before { opacity: 0.05; }
        .section:hover { flex: 1.5; }

        .section h2 { font-size: 6rem; letter-spacing: 25px; color: #fff; text-transform: uppercase; z-index: 1; transition: 0.5s; font-weight: 700; opacity: 0.3; }
        .section:hover h2 { opacity: 1; letter-spacing: 40px; color: var(--cyan); }
        
        .section p { z-index: 1; letter-spacing: 8px; color: var(--cyan); font-size: 0.7rem; text-transform: uppercase; margin-top: 20px; }

        @keyframes fadeInUI { from { opacity: 0; } to { opacity: 1; } }
        footer { position: fixed; bottom: 30px; font-size: 0.6rem; color: #333; letter-spacing: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="bg-scanner"></div>
    <img src="logo-automotive.jpg" class="brand-logo" alt="Logo Tensyle">

    <main class="main-portal">
        <a href="automotive.html" class="section">
            <h2>AUTO</h2>
            <p>Engineering & Reconstruction</p>
        </a>
        <a href="motion.html" class="section">
            <h2>MOTION</h2>
            <p>Kinetic Collectibles Lab</p>
        </a>
    </main>
    <footer>TENSYLE . PRECISION IN EVERY LAYER . 2026</footer>
    <script>window.oncontextmenu = function() { return false; };</script>
</body>
</html>
