        .section-title { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-transform: uppercase; text-align: center; margin-bottom: 60px; }
        .section-title span { color: var(--tensyle-blue); }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .card { background: var(--dark-gray); border: 1px solid #222; overflow: hidden; position: relative; transition: var(--transition); }

        .card img { width: 100%; height: 380px; object-fit: cover; filter: grayscale(100%); transition: var(--transition); }
