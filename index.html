<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tensyle | Precision in Every Layer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Oswald:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00d4ff; 
            --black: #050505; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Oswald', sans-serif; 
            background: var(--black); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- FONDO RADIAL --- */
        .bg-env {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1a20 0%, #000 100%);
            z-index: -1;
        }

        /* --- ANIMACIÓN DEL LOGO (DE ATRÁS HACIA ADELANTE) --- */
        .logo-intro {
            position: absolute;
            width: 180px; /* Ajusta según el tamaño de tu logo-instagram.jpg */
            z-index: 5;
            animation: logoZoom 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
        }

        @keyframes logoZoom {
            0% { 
                transform: scale(0.1); 
                opacity: 0; 
                filter: blur(10px);
            }
            50% {
                opacity: 1;
                filter: blur(0px);
            }
            100% { 
                transform: scale(1); 
                top: 10%; /* Se posiciona arriba tras la animación */
                width: 80px; /* Se reduce un poco para dar espacio al menú */
            }
        }

        /* --- CONTENEDOR DE SELECCIÓN --- */
        .gate-container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            z-index: 10;
            opacity: 0;
            animation: fadeInOptions 1s ease-out 2s forwards; /* Aparece después del logo */
        }

        .gate-card {
            flex: 1;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #222;
            padding: 60px 40px;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .gate-card:hover {
            border-color: var(--cyan);
            background: rgba(0, 212, 255, 0.05);
            transform: translateY(-10px);
        }

        .gate-card h2 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            color: #fff;
            margin-bottom: 15px;
        }

        .gate-card p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-portal {
            padding: 10px 25px;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeInOptions {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: fixed;
            bottom: 20px;
            color: #444;
            font-size: 0.6rem;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .gate-container { flex-direction: column; height: 70vh; justify-content: center; }
            .logo-intro { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="bg-env"></div>

    <img src="logo-instagram.jpg" class="logo-intro" alt="Tensyle Logo">

    <main class="gate-container">
        <a href="automotive.html" class="gate-card">
            <h2>AUTOMOTIVE</h2>
            <p>Ingeniería de precisión y reconstrucción de piezas descontinuadas mediante escaneo 3D y polímeros técnicos.</p>
            <div class="btn-portal">ENTRAR</div>
        </a>

        <a href="motion.html" class="gate-card">
            <h2>MOTION</h2>
            <p>Diseño y fabricación de figuras coleccionables articuladas con mecanismos reforzados de alta durabilidad.</p>
            <div class="btn-portal">EXPLORAR</div>
        </a>
    </main>

    <footer>TENSYLE SOLUTIONS © 2026 | CHÍA</footer>

    <script>
        window.oncontextmenu = function() { return false; };
    </script>
</body>
</html>
