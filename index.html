<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENSYLE | Master Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Oswald:wght@200;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --black: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); height: 100vh; overflow: hidden; font-family: 'Oswald', sans-serif; display: flex; align-items: center; justify-content: center; perspective: 2000px; }

        /* Fondo de red neuronal / ingeniería */
        .grid-bg { position: fixed; width: 200%; height: 200%; background-image: 
            linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: rotateX(60deg) translateY(-50%); z-index: -1; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { from { transform: rotateX(60deg) translateY(-50%); } to { transform: rotateX(60deg) translateY(0%); } }

        /* LOGO TENSYLE - Animación de Impacto */
        .logo-center { position: absolute; width: 300px; z-index: 100; filter: drop-shadow(0 0 50px var(--cyan)); animation: logoHero 3.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes logoHero {
            0% { transform: scale(0) translateZ(-1000px) rotateY(90deg); opacity: 0; }
            50% { opacity: 1; transform: scale(1.2) translateZ(100px) rotateY(0deg); }
            100% { transform: scale(1) translateY(-250px); width: 120px; }
        }

        /* Portales de Selección */
        .main-gate { display: flex; gap: 40px; width: 90%; max-width: 1200px; z-index: 50; opacity: 0; animation: fadeInUI 1.5s ease-out 2.8s forwards; }
        .gate-card { flex: 1; height: 500px; position: relative; border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 5px; overflow: hidden; text-decoration: none; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .gate-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.1), transparent); transform: translateX(-100%); transition: 0.6s; }
        .gate-card:hover::before { transform: translateX(100%); }
        .gate-card:hover { border-color: var(--cyan); transform: scale(1.02); box-shadow: 0 0 80px rgba(0, 242, 255, 0.15); }

        .gate-card h2 { font-size: 3.5rem; letter-spacing: 15px; color: #fff; text-transform: uppercase; margin-bottom: 20px; transition: 0.4s; }
        .gate-card p { font-size: 0.7rem; letter-spacing: 5px; color: var(--cyan); text-transform: uppercase; opacity: 0.7; }

        .enter-btn { margin-top: 40px; padding: 15px 50px; border: 1px solid var(--cyan); color: #fff; letter-spacing: 5px; font-size: 0.7rem; transition: 0.3s; }
        .gate-card:hover .enter-btn { background: var(--cyan); color: #000; font-weight: bold; box-shadow: 0 0 20px var(--cyan); }

        @keyframes fadeInUI { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }
        
        footer { position: fixed; bottom: 30px; font-size: 0.6rem; color: #444; letter-spacing: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <img src="logo-automotive.jpg" class="logo-center" alt="Tensyle Logo">

    <main class="main-gate">
        <a href="automotive.html" class="gate-card">
            <h2>Automotive</h2>
            <p>Industrial Additive Manufacturing</p>
            <div class="enter-btn">ACCESS CORE</div>
        </a>
        <a href="motion.html" class="gate-card">
            <h2>Motion</h2>
            <p>Advanced Kinetic Engineering</p>
            <div class="enter-btn">EXPLORE LAB</div>
        </a>
    </main>
    <footer>TENSYLE . PRECISION IN EVERY LAYER . 2026</footer>
    <script>window.oncontextmenu = function() { return false; };</script>
</body>
</html>
