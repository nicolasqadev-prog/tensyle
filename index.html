<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tensyle | Precision in Every Layer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Oswald:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --black: #050505; --glass: rgba(15, 15, 15, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Oswald', sans-serif; background: var(--black); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1e24 0%, #000 100%); z-index: -1; }
        
        /* Animación Logo Malla Hexagonal */
        .logo-intro { position: absolute; width: 280px; z-index: 50; filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.2)); animation: logoEntrance 2.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        @keyframes logoEntrance {
            0% { transform: scale(0.1); opacity: 0; filter: blur(15px); }
            60% { opacity: 1; filter: blur(0px); }
            100% { transform: scale(1) translateY(-200px); width: 110px; }
        }

        .portal-grid { display: flex; gap: 30px; width: 100%; max-width: 1000px; padding: 0 20px; z-index: 100; opacity: 0; animation: showContent 1s ease-out 2.2s forwards; }
        .unit-card { flex: 1; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 60px 40px; text-align: center; text-decoration: none; border-radius: 20px; transition: 0.5s; display: flex; flex-direction: column; align-items: center; }
        .unit-card:hover { border-color: var(--cyan); transform: translateY(-15px); box-shadow: 0 20px 50px rgba(0, 242, 255, 0.15); }
        .unit-card h2 { font-size: 2.5rem; letter-spacing: 6px; color: #fff; margin-bottom: 20px; }
        .action-btn { padding: 14px 40px; border: 1px solid var(--cyan); color: var(--cyan); letter-spacing: 3px; text-transform: uppercase; transition: 0.3s; }
        .unit-card:hover .action-btn { background: var(--cyan); color: #000; }
        @keyframes showContent { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        footer { position: fixed; bottom: 30px; font-size: 0.65rem; color: #444; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div class="bg-space"></div>
    <img src="logo-instagram.jpg" class="logo-intro" alt="Logo Tensyle">
    <main class="portal-grid">
        <a href="automotive.html" class="unit-card">
            <h2>AUTOMOTIVE</h2>
            <p>Ingeniería, escaneo 3D y reconstrucción de piezas industriales.</p>
            <div class="action-btn">INGRESAR</div>
        </a>
        <a href="motion.html" class="unit-card">
            <h2>MOTION</h2>
            <p>Figuras articuladas y coleccionables premium reforzados.</p>
            <div class="action-btn">EXPLORAR</div>
        </a>
    </main>
    <footer>TENSYLE SOLUTIONS © 2026 | CHÍA, COLOMBIA</footer>
</body>
</html>
